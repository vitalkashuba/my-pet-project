{% extends 'base.html' %}
{% block title %}Карта — Django Chat{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
.map-layout { display: flex; height: calc(100vh - 56px); margin: -1.5rem; overflow: hidden; }
#map { flex: 1; z-index: 1; }
.sidebar { width: 320px; background: white; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; }
.sidebar-header { padding: 1rem; border-bottom: 1px solid #e5e7eb; }
.sidebar-header h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; }
.sidebar-header p { font-size: 0.78rem; color: #9ca3af; }
.nearby-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
.user-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0.75rem; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
.user-item:hover { background: #f3f4f6; }
.user-item.active { background: #eef2ff; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: #4f46e5; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 0.88rem; font-weight: 500; }
.user-dist { font-size: 0.75rem; color: #9ca3af; }
.chat-panel { border-top: 1px solid #e5e7eb; display: flex; flex-direction: column; height: 320px; }
.chat-panel-header { padding: 0.65rem 1rem; border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; font-weight: 500; color: #374151; display: flex; align-items: center; justify-content: space-between; }
.close-chat { background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 1rem; line-height: 1; }
.close-chat:hover { color: #374151; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.4rem; }
.cmsg { max-width: 80%; display: flex; flex-direction: column; }
.cmsg.own { align-self: flex-end; align-items: flex-end; }
.cmsg.other { align-self: flex-start; }
.cmsg-bubble { padding: 0.4rem 0.75rem; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; word-break: break-word; }
.cmsg.own .cmsg-bubble { background: #4f46e5; color: white; border-bottom-right-radius: 3px; }
.cmsg.other .cmsg-bubble { background: #f3f4f6; color: #1a1a1a; border-bottom-left-radius: 3px; }
.cmsg-time { font-size: 0.65rem; color: #9ca3af; margin-top: 2px; }
.chat-input-row { display: flex; gap: 0.5rem; padding: 0.65rem; border-top: 1px solid #e5e7eb; }
.chat-input-row input { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.85rem; outline: none; }
.chat-input-row input:focus { border-color: #4f46e5; }
.chat-input-row button { padding: 0.5rem 0.9rem; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 0.82rem; cursor: pointer; }
.chat-input-row button:hover { background: #4338ca; }
.no-chat { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: #9ca3af; text-align: center; padding: 1rem; }
.status-bar { padding: 0.4rem 1rem; background: #f9fafb; border-top: 1px solid #e5e7eb; font-size: 0.72rem; color: #9ca3af; }
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.dot.green { background: #22c55e; }
.dot.red { background: #ef4444; }
.dot.yellow { background: #f59e0b; }
.empty-nearby { text-align: center; padding: 2rem 1rem; color: #9ca3af; font-size: 0.85rem; }
</style>
{% endblock %}
{% block content %}
<div class="map-layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>Люди поруч</h3>
      <p id="nearby-count">Шукаємо...</p>
    </div>
    <div class="nearby-list" id="nearby-list">
      <div class="empty-nearby">Вмикаємо геолокацію...</div>
    </div>
    <div id="chat-area">
      <div class="no-chat">Оберіть людину зі списку щоб написати</div>
    </div>
    <div class="status-bar">
      <span class="dot yellow" id="ws-dot"></span>
      <span id="ws-status">Підключення...</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const currentUser = '{{ request.user.username }}';
const currentUserId = '{{ request.user.id }}';
const RADIUS = 100; // метрів

let map, myMarker, myLat, myLng;
let socket;
let nearbyUsers = {};   // { userId: { username, lat, lng, marker, dist } }
let activeChat = null;  // userId активного чату
let chatHistory = {};   // { userId: [{text, own, time}] }

// --- Карта ---
function initMap(lat, lng) {
  if (map) return;
  map = L.map('map').setView([lat, lng], 18);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const myIcon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:#4f46e5;border:2px solid white;border-radius:50%;box-shadow:0 0 0 3px rgba(79,70,229,0.3)"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
  myMarker = L.marker([lat, lng], { icon: myIcon })
    .addTo(map)
    .bindPopup(`<b>Ви (${currentUser})</b>`);
}

function updateMyMarker(lat, lng) {
  if (myMarker) myMarker.setLatLng([lat, lng]);
  if (map) map.setView([lat, lng], map.getZoom());
}

// --- Haversine ---
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// --- Маркери ---
function makeUserIcon(username) {
  const initials = username.slice(0, 2).toUpperCase();
  return L.divIcon({
    className: '',
    html: `<div style="width:32px;height:32px;background:#ef4444;border:2px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:pointer">${initials}</div>`,
    iconSize: [32, 32], iconAnchor: [16, 16]
  });
}

function addOrUpdateUser(userId, username, lat, lng) {
  const dist = (myLat && myLng) ? haversine(myLat, myLng, lat, lng) : '?';
  if (nearbyUsers[userId]) {
    nearbyUsers[userId].marker.setLatLng([lat, lng]);
    nearbyUsers[userId].lat = lat;
    nearbyUsers[userId].lng = lng;
    nearbyUsers[userId].dist = dist;
  } else {
    const marker = L.marker([lat, lng], { icon: makeUserIcon(username) })
      .addTo(map)
      .bindPopup(`<b>${username}</b><br>${dist}м від вас<br><button onclick="openChat(${userId})" style="margin-top:4px;padding:2px 8px;background:#4f46e5;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px">Написати</button>`);
    marker.on('click', () => marker.openPopup());
    nearbyUsers[userId] = { username, lat, lng, marker, dist };
    if (!chatHistory[userId]) chatHistory[userId] = [];
  }
  renderNearbyList();
}

function removeUser(userId) {
  if (nearbyUsers[userId]) {
    map.removeLayer(nearbyUsers[userId].marker);
    delete nearbyUsers[userId];
    renderNearbyList();
    if (activeChat === userId) closeChat();
  }
}

// --- Список ---
function renderNearbyList() {
  const list = document.getElementById('nearby-list');
  const count = Object.keys(nearbyUsers).length;
  document.getElementById('nearby-count').textContent =
    count ? `${count} людин(а) в радіусі ${RADIUS}м` : 'Нікого поруч';

  if (!count) {
    list.innerHTML = '<div class="empty-nearby">Нікого поруч у радіусі 100м</div>';
    return;
  }
  list.innerHTML = Object.entries(nearbyUsers).map(([uid, u]) => `
    <div class="user-item ${activeChat == uid ? 'active' : ''}" onclick="openChat(${uid})">
      <div class="avatar">${u.username.slice(0,2).toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${escHtml(u.username)}</div>
        <div class="user-dist">${u.dist}м від вас</div>
      </div>
    </div>
  `).join('');
}

// --- Чат ---
function openChat(userId) {
  activeChat = userId;
  const u = nearbyUsers[userId];
  if (!u) return;
  renderNearbyList();

  const chatArea = document.getElementById('chat-area');
  chatArea.innerHTML = `
    <div class="chat-panel">
      <div class="chat-panel-header">
        <span>💬 ${escHtml(u.username)}</span>
        <button class="close-chat" onclick="closeChat()">✕</button>
      </div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-row">
        <input type="text" id="priv-input" placeholder="Повідомлення..." autocomplete="off">
        <button onclick="sendPrivate()">↑</button>
      </div>
    </div>
  `;
  document.getElementById('priv-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendPrivate();
  });
  renderChatMessages(userId);
}

function closeChat() {
  activeChat = null;
  document.getElementById('chat-area').innerHTML =
    '<div class="no-chat">Оберіть людину зі списку щоб написати</div>';
  renderNearbyList();
}

function renderChatMessages(userId) {
  const el = document.getElementById('chat-msgs');
  if (!el) return;
  const msgs = chatHistory[userId] || [];
  el.innerHTML = msgs.map(m => `
    <div class="cmsg ${m.own ? 'own' : 'other'}">
      <div class="cmsg-bubble">${escHtml(m.text)}</div>
      <span class="cmsg-time">${m.time}</span>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

function sendPrivate() {
  const input = document.getElementById('priv-input');
  const text = input?.value.trim();
  if (!text || !activeChat || socket?.readyState !== WebSocket.OPEN) return;
  socket.send(JSON.stringify({
    type: 'private_message',
    to_user_id: activeChat,
    content: text,
  }));
  const time = new Date().toLocaleTimeString('uk', { hour: '2-digit', minute: '2-digit' });
  if (!chatHistory[activeChat]) chatHistory[activeChat] = [];
  chatHistory[activeChat].push({ text, own: true, time });
  renderChatMessages(activeChat);
  input.value = '';
}

function receivePrivate(fromUserId, fromUsername, text) {
  if (!chatHistory[fromUserId]) chatHistory[fromUserId] = [];
  const time = new Date().toLocaleTimeString('uk', { hour: '2-digit', minute: '2-digit' });
  chatHistory[fromUserId].push({ text, own: false, time });
  if (activeChat === fromUserId) renderChatMessages(fromUserId);
  else {
    // сповіщення
    const item = document.querySelector(`.user-item[onclick="openChat(${fromUserId})"]`);
    if (item && !item.querySelector('.notif')) {
      item.insertAdjacentHTML('beforeend', '<span class="notif" style="width:8px;height:8px;background:#ef4444;border-radius:50%;display:inline-block"></span>');
    }
  }
}

// --- WebSocket ---
function connectWS() {
  const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
  socket = new WebSocket(`${wsProto}://${location.host}/ws/geo/`);

  socket.onopen = () => {
    setWsStatus('connected');
    // Одразу надіслати свою локацію
    if (myLat && myLng) {
      socket.send(JSON.stringify({ type: 'location_update', lat: myLat, lng: myLng }));
    }
  };
  socket.onclose = () => { setWsStatus('error'); setTimeout(connectWS, 3000); };
  socket.onerror = () => setWsStatus('error');

  socket.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'user_location') {
      if (data.user_id !== currentUserId) {
        addOrUpdateUser(data.user_id, data.username, data.lat, data.lng);
      }
    } else if (data.type === 'user_left') {
      removeUser(data.user_id);
    } else if (data.type === 'private_message') {
      receivePrivate(data.from_user_id, data.from_username, data.content);
    } else if (data.type === 'nearby_users') {
      data.users.forEach(u => addOrUpdateUser(u.user_id, u.username, u.lat, u.lng));
    }
  };
}

function setWsStatus(state) {
  const dot = document.getElementById('ws-dot');
  const txt = document.getElementById('ws-status');
  if (state === 'connected') { dot.className = 'dot green'; txt.textContent = 'Підключено'; }
  else if (state === 'error')  { dot.className = 'dot red';   txt.textContent = 'Відключено'; }
  else                         { dot.className = 'dot yellow'; txt.textContent = 'Підключення...'; }
}

// --- Геолокація ---
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;
    initMap(myLat, myLng);
    connectWS();
  }, () => {
    // fallback — Львів центр
    myLat = 49.8397; myLng = 24.0297;
    initMap(myLat, myLng);
    connectWS();
  });

} else {
  alert('Браузер не підтримує геолокацію');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
{% endblock %}
