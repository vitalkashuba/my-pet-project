{% extends 'base.html' %}
{% block title %}Нова кімната — Django Chat{% endblock %}
{% block extra_css %}
<style>
.form-card { max-width: 480px; margin: 2rem auto; background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 2rem; }
h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
.field { margin-bottom: 1.1rem; }
label { display: block; font-size: 0.85rem; font-weight: 500; color: #374151; margin-bottom: 0.4rem; }
input, textarea { width: 100%; padding: 0.6rem 0.9rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.95rem; outline: none; font-family: inherit; }
input:focus, textarea:focus { border-color: #4f46e5; }
textarea { resize: vertical; min-height: 80px; }
.btn { padding: 0.7rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 500; cursor: pointer; }
.btn:hover { background: #4338ca; }
</style>
{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Нова кімната</h2>
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Назва кімнати</label>
      <input type="text" name="name" required autofocus placeholder="наприклад: загальний">
    </div>
    <div class="field">
      <label>Опис (необовʼязково)</label>
      <textarea name="description" placeholder="Для чого ця кімната?"></textarea>
    </div>
    <button type="submit" class="btn">Створити</button>
  </form>
</div>
{% endblock %}
