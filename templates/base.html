<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Django Chat{% endblock %}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
nav { background: #1a1a2e; color: white; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
nav a { color: #e0e0e0; text-decoration: none; font-weight: 500; }
nav a:hover { color: white; }
.nav-brand { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.3px; }
.nav-right { display: flex; align-items: center; gap: 1.5rem; font-size: 0.9rem; }
.container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.messages-list { margin-bottom: 1rem; }
.alert { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 0.75rem; font-size: 0.9rem; }
.alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="nav-brand">💬 Django Chat</a>
  <div class="nav-right">
    {% if user.is_authenticated %}
      <span>{{ user.username }}</span>
      <a href="/map/">🗺 Карта</a>
      <a href="/create/">+ Кімната</a>
      <a href="/logout/">Вийти</a>
    {% else %}
      <a href="/login/">Увійти</a>
      <a href="/register/">Реєстрація</a>
    {% endif %}
  </div>
</nav>
<div class="container">
  {% if messages %}
  <div class="messages-list">
    {% for msg in messages %}
    <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
