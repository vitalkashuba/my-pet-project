{% extends 'base.html' %}
{% block title %}Реєстрація — Django Chat{% endblock %}
{% block extra_css %}
<style>
.auth-card { max-width: 380px; margin: 3rem auto; background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 2rem; }
h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 1.5rem; text-align: center; }
.field { margin-bottom: 1rem; }
label { display: block; font-size: 0.85rem; font-weight: 500; color: #374151; margin-bottom: 0.4rem; }
input { width: 100%; padding: 0.6rem 0.9rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.95rem; outline: none; }
input:focus { border-color: #4f46e5; }
.btn-full { width: 100%; padding: 0.7rem; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 500; cursor: pointer; margin-top: 0.5rem; }
.btn-full:hover { background: #4338ca; }
.auth-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #6b7280; }
.auth-link a { color: #4f46e5; text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>Реєстрація</h2>
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Імʼя користувача</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password1" required>
    </div>
    <div class="field">
      <label>Підтвердити пароль</label>
      <input type="password" name="password2" required>
    </div>
    <button type="submit" class="btn-full">Зареєструватися</button>
  </form>
  <div class="auth-link">Вже є акаунт? <a href="/login/">Увійти</a></div>
</div>
{% endblock %}
